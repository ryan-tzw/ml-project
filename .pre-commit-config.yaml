repos:
    - repo: https://github.com/astral-sh/uv-pre-commit
      # uv version.
      rev: 0.10.9
      hooks:
          - id: uv-lock

    - repo: https://github.com/astral-sh/uv-pre-commit
      # uv version.
      rev: 0.10.9
      hooks:
          - id: uv-export

    - repo: https://github.com/astral-sh/ruff-pre-commit
      # Ruff version.
      rev: v0.15.2
      hooks:
          # Run the linter.
          - id: ruff-check
            args: [--fix]
          # Run the formatter.
          - id: ruff-format
